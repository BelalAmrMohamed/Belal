<style>
    :root {
      --theme-color: #333;
      --background-light: #FF6F61;
      --text-dark: #333;
      --text-light: #fff;
    }

    .light-theme {
      --theme-color: #fff;
      --text-dark: #333;
      --text-light: #333;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--theme-color);
      color: var(--text-light);
      transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
      text-align: center;
    }

    header {
      background-color: var(--background-light);
      padding: 20px;
    }

    header h1 {
      font-size: 2.5rem;
      margin: 0;
      font-weight: bold;
      animation: slideInDown 1s ease-out;
    }

    .logo-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px auto;
      height: 200px;
      /* Reserve space for the logos */
    }

    .logo-container img {
      position: absolute;
      width: 200px;
      animation: fadeIn 0.5s ease-in-out forwards;
    }

    .logo-container img.hidden {
      animation: fadeOut 0.5s ease-in-out forwards;
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
      text-align: center;
    }

    .section button {
      font-size: 1.5rem;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: var(--primary-color);
      color: var(--theme-dark-text);
      cursor: pointer;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease-in-out;
    }

    .section button:hover {
      background: var(--hover-color);
      transform: scale(1.05);
    }

    .links {
      display: none;
      animation: fadeIn 1s forwards;
    }

    .links a {

  display: block;

  font-size: 1rem;

  margin: 8px 0;

  padding: 10px;

  text-decoration: none;

  color: var(--theme-dark-text);
  

  border-radius: 6px;

  transition: all 0.3s ease-in-out;

  box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.1);

}

    .links a:hover {
  transform: translateY(-3px);
}


#toggleThemeButton {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 10px;
  font-size: 1.2rem;
  background-color: #17202A;
  color: var(--theme-dark-text);
  border: none;
  border-radius: 50%;
  box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
  cursor: pointer;
  transition: background 0.3s ease;
  z-index: 1000; /* Ensure it's on top */
}

    #toggleThemeButton:hover {
      background-color: #17202A;
      color: white;
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <button id="toggleThemeButton" onclick="toggleTheme()">🌙</button>

  <header>
    <h1>Belal Amr's Developments</h1>
    <div class="logo-container">
      <img id="themeLogo" class="hidden" src="https://blogger.googleusercontent.com/img/a/AVvXsEiPLt1hB7SxxVP38W9ckVtry62D4e_DgDE1kN1vwV-KqBbDD_KK8vyaMD-gxL9Kh_QzHjVTv9Hat3O1xGV2SPxgb1s7h0TixFe-l1np_gd_chkV80v6PWKTg3ngKJPICzfMLzJyGJReq85xbWZWToS7UnecIMXndjqSBickq_dtijsr0ZSs7ybVI2QSRT8=w1684-h1069-p-k-no-nu">
      <img id="defaultLogo" src="https://blogger.googleusercontent.com/img/a/AVvXsEhqAvT_vRn0HsBqWdBAZNwnKtDZscBH6IYekigFaqn8_3UrRV2mBJzip55pQmRHWPRwwTAZJA33Qni_PfBO7rDJ4UYVlsEm7fwqKBPKz4OhE1N6JKufd98NlsddxJQ8325rdZwTpzjxgZVdHOKmbphESxqxxyD4nVzQqx8Oe273zfcGMVbuGEiJWc4QkfM">
    </div>
  </header>

  <nav>
    <div class="section">
      <button onclick="toggleLinks('games')">Games</button>
      <div class="links" id="games">
        <a href="https://belalamrmohamed.github.io/GuessTheWord/" target="_blank">Guess the Word</a>
        <a href="https://belalamrmohamed.github.io/GuessTheNumber/" target="_blank">Guess the Number</a>
        <a href="https://belalamrmohamed.github.io/RockpaperScissors/" target="_blank">Rock Paper Scissors</a>
      </div>
    </div>
    <div class="section">
      <button onclick="toggleLinks('calculators')">Calculators</button>
      <div class="links" id="calculators">
        <a href="https://belalamrmohamed.github.io/BelalAmr/" target="_blank">Numbering Systems</a>
      </div>
    </div>
    <div class="section">
      <button onclick="toggleLinks('ciphers')">Ciphers</button>
      <div class="links" id="ciphers">
        <a href="https://belalamrmohamed.github.io/AllCiphers/" target="_blank">All Ciphers</a>
        <a href="https://belalamrmohamed.github.io/caesar-cypher/" target="_blank">Caesar Cipher</a>
        <a href="https://belalamrmohamed.github.io/playfair-cypher/" target="_blank">Playfair Cipher</a>
        <a href="https://belalamrmohamed.github.io/Row-Transposition/" target="_blank">Row Transposition Cipher</a>
        <a href="https://belalamrmohamed.github.io/Rail-fence-cypher/" target="_blank">Rail Fence Cipher</a>
      </div>
    </div>
  </nav>

  <main>
    <h2>Choose a website</h2>
    <p>I will keep developing more sites.</p>
  </main>

  <script>
    function toggleTheme() {
      const body = document.body;
      const toggleButton = document.getElementById('toggleThemeButton');
      const themeLogo = document.getElementById('themeLogo');
      const defaultLogo = document.getElementById('defaultLogo');

      body.classList.toggle('light-theme');
      toggleButton.textContent = body.classList.contains('light-theme') ? '☀️' : '🌙';

      if (body.classList.contains('light-theme')) {
        defaultLogo.classList.add('hidden');
        themeLogo.classList.remove('hidden');
      } else {
        themeLogo.classList.add('hidden');
        defaultLogo.classList.remove('hidden');
      }
    }

    function toggleLinks(id) {
      const allLinks = document.querySelectorAll('.links');
      allLinks.forEach(section => {
        if (section.id !== id) {
          section.style.display = 'none';
        }
      });
      const currentSection = document.getElementById(id);
      currentSection.style.display = currentSection.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
